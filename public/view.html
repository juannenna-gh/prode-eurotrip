<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODE Eurotrip 3021</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-login-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }

    .admin-login-link:hover {
      background: #5568d3;
      box-shadow: 0 6px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ PRODE Eurotrip 3021</h1>

    <div class="section">
      <h2>Tabla de Posiciones</h2>
      <table id="rankings-table">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Jugador</th>
            <th>Puntos</th>
            <th>Exactos</th>
            <th>Acertados</th>
            <th>Errados</th>
          </tr>
        </thead>
        <tbody id="rankings-body"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Evolución de Posiciones</h2>
      <canvas id="rankings-chart"></canvas>
    </div>

    <div class="section">
      <h2>Partidos</h2>
      <div style="margin-bottom: 15px;">
        <label for="player-filter" style="margin-right: 10px;">Filtrar por jugador:</label>
        <select id="player-filter" onchange="loadMatches()" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer;">
          <option value="">Todos</option>
        </select>
      </div>
      <div id="matches-container"></div>
    </div>
  </div>

  <a href="/login" class="admin-login-link">🔐 Acceso Admin</a>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="view.js"></script>
</body>
</html>
