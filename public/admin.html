<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - PRODE Eurotrip 3021</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-header {
      background: white;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .admin-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .admin-info span {
      color: #666;
      font-weight: 600;
    }

    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    .view-public-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-right: 10px;
    }

    .view-public-btn:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ PRODE Eurotrip 3021 - Admin Panel</h1>

    <div class="admin-header">
      <div class="admin-info">
        <span>👤 <span id="user-name">Loading...</span></span>
      </div>
      <div>
        <a href="/view.html" class="view-public-btn">View Public Page</a>
        <a href="/auth/logout" class="logout-btn">Logout</a>
      </div>
    </div>

    <div class="section">
      <h2>Rankings</h2>
      <table id="rankings-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Points</th>
            <th>Exactos</th>
            <th>Acertados</th>
            <th>Errados</th>
          </tr>
        </thead>
        <tbody id="rankings-body"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Rankings Evolution</h2>
      <canvas id="rankings-chart"></canvas>
    </div>

    <div class="section">
      <h2>Add New Match</h2>
      <div class="add-match-form">
        <input type="text" id="teamA" placeholder="ARG" maxlength="3">
        <span>vs</span>
        <input type="text" id="teamB" placeholder="BRA" maxlength="3">
        <button onclick="addMatch()">Add Match</button>
      </div>
      <p style="color: #666; font-size: 12px; margin-top: 10px;">Use 3-letter codes: ARG, BRA, ESP, GER, etc.</p>
    </div>

    <div class="section">
      <h2>Matches</h2>
      <div id="matches-container"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Check authentication on page load
    async function checkAuth() {
      try {
        const response = await fetch('/auth/status');
        const data = await response.json();

        if (!data.authenticated || !data.isAdmin) {
          window.location.href = '/login.html';
          return;
        }

        document.getElementById('user-name').textContent = data.user.name;
      } catch (error) {
        console.error('Auth check failed:', error);
        window.location.href = '/login.html';
      }
    }

    checkAuth();
  </script>
</body>
</html>
